  <h2 data-de="Datenschutzerklärung" data-en="Privacy Policy"></h2>

  <div class="callout">
    <p data-de="<strong>Das Wichtigste vorab:</strong> Die Software Syncpoint Map Server arbeitet offline und sendet keine Daten an uns — keine Telemetrie, kein Cloud-Endpoint. Personenbezogene Daten fallen im Wesentlichen nur beim Kauf an, der über unseren Merchant of Record Paddle abgewickelt wird." data-en="<strong>The essentials first:</strong> The Syncpoint Map Server software works offline and sends no data to us — no telemetry, no cloud endpoint. Personal data is essentially only processed during the purchase, which is handled by our Merchant of Record, Paddle."></p>

  <h3 data-de="1. Verantwortlicher" data-en="1. Controller"></h3>
  <p data-de="Verantwortlich für die Datenverarbeitung im Sinne der Datenschutz-Grundverordnung (DSGVO) ist:<br>Syncpoint GmbH, Wiesenweg 12, 5400 Hallein, Österreich<br>E-Mail: <a href='mailto:office@syncpoint.io'>office@syncpoint.io</a>" data-en="The controller responsible for data processing within the meaning of the General Data Protection Regulation (GDPR) is:<br>Syncpoint GmbH, Wiesenweg 12, 5400 Hallein, Austria<br>Email: <a href='mailto:office@syncpoint.io'>office@syncpoint.io</a>"></p>

  <h3 data-de="2. Verarbeitung beim Besuch dieser Website" data-en="2. Processing when visiting this website"></h3>
  <p data-de="Diese Website wird statisch über GitHub Pages (GitHub, Inc., bzw. GitHub B.V.) gehostet. Beim Aufruf der Seite verarbeitet der Hosting-Anbieter technisch notwendige Zugriffsdaten (z. B. IP-Adresse, Datum und Uhrzeit, abgerufene Datei, Browsertyp) in Server-Logfiles. Rechtsgrundlage ist unser berechtigtes Interesse an einer sicheren und stabilen Bereitstellung der Website (Art. 6 Abs. 1 lit. f DSGVO). Wir setzen auf dieser Website keine Tracking-Cookies und keine Analyse-Tools ein. Schriftarten und Icons werden lokal von dieser Website ausgeliefert. Im Preisbereich der Startseite wird zusätzlich Paddle.js von den Servern unseres Zahlungsdienstleisters Paddle (cdn.paddle.com) geladen, um lokalisierte Preise anzuzeigen und den Kauf zu ermöglichen — Einzelheiten dazu in Abschnitt 4." data-en="This website is hosted statically via GitHub Pages (GitHub, Inc. / GitHub B.V.). When you access the site, the hosting provider processes technically necessary access data (e.g. IP address, date and time, file requested, browser type) in server log files. The legal basis is our legitimate interest in providing the website securely and reliably (Art. 6(1)(f) GDPR). We do not use any tracking cookies or analytics tools on this website. Fonts and icons are served locally from this website. In addition, the pricing section of the start page loads Paddle.js from the servers of our payment provider Paddle (cdn.paddle.com) in order to display localized prices and enable purchases — see section 4 for details."></p>

  <h3 data-de="3. Verarbeitung in der Software" data-en="3. Processing within the software"></h3>
  <p data-de="Syncpoint Map Server ist als Offline-Software konzipiert. Die Anwendung überträgt im Betrieb keine personenbezogenen Daten oder Nutzungsdaten an Syncpoint oder Dritte. Es findet keine Telemetrie statt. Alle Karten- und Konfigurationsdaten verbleiben auf Deinem Gerät." data-en="Syncpoint Map Server is designed as offline software. During operation, the application does not transmit any personal data or usage data to Syncpoint or third parties. No telemetry takes place. All map and configuration data remains on your device."></p>

  <h3 data-de="4. Kauf und Zahlungsabwicklung über Paddle" data-en="4. Purchase and payment processing via Paddle"></h3>
  <p data-de="Der Verkauf erfolgt über unseren Reseller und Merchant of Record, die Paddle.com Market Ltd, Judd House, 18–29 Mora Street, London EC1V 8BT, Vereinigtes Königreich. Beim Kauf gibst Du Deine Daten (z. B. Name, E-Mail-Adresse, Rechnungsanschrift, Zahlungsdaten) direkt bei Paddle ein. Paddle verarbeitet diese Daten in eigener datenschutzrechtlicher Verantwortung, um den Kaufvertrag abzuwickeln, die Zahlung durchzuführen, die Rechnung zu erstellen und Steuern abzuführen. Wir erhalten von Paddle nur die zur Lizenz- und Auftragsverwaltung erforderlichen Daten (z. B. Name, E-Mail, Bestell- und Lizenzinformationen). Rechtsgrundlage ist die Vertragserfüllung (Art. 6 Abs. 1 lit. b DSGVO). Zur Anzeige lokalisierter Preise und zur Abwicklung des Kaufs binden wir auf der Startseite Paddle.js ein (geladen von cdn.paddle.com); dabei wird Deine IP-Adresse an Paddle übermittelt, um Währung, Preis und Steuer für Deine Region zu bestimmen (Art. 6 Abs. 1 lit. f DSGVO). Während des Checkouts kann Paddle technisch notwendige Cookies zur Zahlungsabwicklung und Betrugsprävention setzen. Einzelheiten zur Verarbeitung durch Paddle findest Du in der <a href='https://www.paddle.com/legal/privacy' target='_blank' rel='noopener'>Datenschutzerklärung von Paddle</a>." data-en="Sales are handled by our reseller and Merchant of Record, Paddle.com Market Ltd, Judd House, 18–29 Mora Street, London EC1V 8BT, United Kingdom. During the purchase, you enter your data (e.g. name, email address, billing address, payment data) directly with Paddle. Paddle processes this data under its own data protection responsibility in order to perform the contract, process payment, issue the invoice, and remit taxes. From Paddle, we only receive the data required for license and order management (e.g. name, email, order and license information). The legal basis is contract performance (Art. 6(1)(b) GDPR). To display localized prices and process the purchase, the start page embeds Paddle.js (loaded from cdn.paddle.com); in doing so, your IP address is transmitted to Paddle to determine currency, price, and tax for your region (Art. 6(1)(f) GDPR). During checkout, Paddle may set technically necessary cookies for payment processing and fraud prevention. For details on Paddle's processing, see <a href='https://www.paddle.com/legal/privacy' target='_blank' rel='noopener'>Paddle's privacy policy</a>."></p>

  <h3 data-de="5. Auslieferung und Update-Benachrichtigungen" data-en="5. Delivery and update notifications"></h3>
  <p data-de="Nach dem Kauf liefern wir den Download des Installers aus und informieren Dich über neue Versionen (zugesagte Lifetime Updates). Dazu betreiben wir eine Azure Function (Microsoft Azure), die Dir einen dauerhaften, persönlichen Download-Link bereitstellt (beim Abruf wird jeweils kurzzeitig eine signierte Storage-URL erzeugt) und die E-Mail über Microsoft 365 (Microsoft Graph) als office@syncpoint.io versendet. Wir führen dafür <strong>keine eigene Käuferdatenbank</strong>: Deine E-Mail-Adresse wird zum Versand jeweils aktuell von Paddle (System of Record für Käufer) abgerufen und nur für den Versand verarbeitet. Dauerhaft gespeichert wird lediglich die Transaktions-ID, um doppelte Zustellungen zu vermeiden (ohne Personenbezug). Rechtsgrundlage ist die Vertragserfüllung (Art. 6 Abs. 1 lit. b DSGVO), da Lifetime Updates Teil des Leistungsversprechens sind. Jede Update-Benachrichtigung enthält einen Abmeldelink; meldest Du Dich ab, wird dies bei Paddle am Kundendatensatz vermerkt und Du erhältst keine weiteren Benachrichtigungen — auch dieser Opt-out wird nicht bei uns gespeichert." data-en="After purchase, we deliver the installer download and inform you about new versions (the promised lifetime updates). For this we operate an Azure Function (Microsoft Azure) that provides you with a durable, personal download link (each retrieval briefly generates a signed storage URL) and sends the email via Microsoft 365 (Microsoft Graph) as office@syncpoint.io. We do <strong>not</strong> maintain our own customer database for this: your email address is retrieved from Paddle (the system of record for buyers) at send time and processed only for sending. Only the transaction ID is stored permanently, to avoid duplicate deliveries (no personal reference). The legal basis is contract performance (Art. 6(1)(b) GDPR), as lifetime updates are part of what we promise. Every update notification contains an unsubscribe link; if you unsubscribe, this is recorded on the customer record at Paddle and you receive no further notifications — this opt-out, too, is not stored by us."></p>

  <h3 data-de="6. Kontaktaufnahme und Support" data-en="6. Contacting us and support"></h3>
  <p data-de="Wenn Du uns per E-Mail kontaktierst (z. B. wegen Support oder einer Erstattung), verarbeiten wir Deine Angaben zur Bearbeitung Deiner Anfrage. Rechtsgrundlage ist Art. 6 Abs. 1 lit. b DSGVO (vorvertragliche bzw. vertragliche Maßnahmen) bzw. lit. f (berechtigtes Interesse an der Beantwortung von Anfragen)." data-en="If you contact us by email (e.g. for support or a refund), we process your information to handle your request. The legal basis is Art. 6(1)(b) GDPR (pre-contractual or contractual measures) or (f) (legitimate interest in responding to enquiries)."></p>

  <h3 data-de="7. Speicherdauer" data-en="7. Retention period"></h3>
  <p data-de="Wir speichern personenbezogene Daten nur so lange, wie es für die genannten Zwecke erforderlich ist oder gesetzliche Aufbewahrungsfristen (insbesondere steuer- und unternehmensrechtliche Pflichten, in der Regel 7 Jahre) dies vorsehen. Für die Auslieferung der Lifetime Updates wird Deine E-Mail-Adresse verwendet, solange wir das Produkt anbieten bzw. bis Du den Updates widersprichst oder Deine Löschung verlangst (Art. 21 bzw. Art. 17 DSGVO); die Adresse selbst halten nicht wir, sondern Paddle vor. Unabhängig davon speichert Paddle Kauf- und Kontaktdaten zur Erfüllung eigener gesetzlicher, insbesondere steuer- und buchhalterischer Pflichten." data-en="We store personal data only for as long as necessary for the stated purposes or as required by statutory retention periods (in particular tax and company law obligations, generally 7 years). For delivering the lifetime updates, your email address is used for as long as we offer the product, or until you object to the updates or request erasure (Art. 21 or Art. 17 GDPR); the address itself is held by Paddle, not by us. Independently of this, Paddle retains purchase and contact data to meet its own statutory obligations, in particular tax and accounting requirements."></p>

  <h3 data-de="8. Empfänger und Drittlandübermittlung" data-en="8. Recipients and transfers to third countries"></h3>
  <p data-de="Empfänger personenbezogener Daten sind die genannten Dienstleister (Paddle, Microsoft – Azure und Microsoft 365, GitHub). Soweit dabei Daten in Drittländer (z. B. USA oder Vereinigtes Königreich) übermittelt werden, erfolgt dies auf Grundlage geeigneter Garantien (z. B. EU-Standardvertragsklauseln oder Angemessenheitsbeschluss)." data-en="Recipients of personal data are the service providers named above (Paddle, Microsoft – Azure and Microsoft 365, GitHub). Where data is transferred to third countries (e.g. the USA or the United Kingdom), this is done on the basis of appropriate safeguards (e.g. EU standard contractual clauses or an adequacy decision)."></p>

  <h3 data-de="9. Deine Rechte" data-en="9. Your rights"></h3>
  <p data-de="Du hast nach der DSGVO das Recht auf Auskunft (Art. 15), Berichtigung (Art. 16), Löschung (Art. 17), Einschränkung der Verarbeitung (Art. 18), Datenübertragbarkeit (Art. 20) sowie Widerspruch gegen die Verarbeitung (Art. 21). Zur Ausübung Deiner Rechte genügt eine E-Mail an <a href='mailto:office@syncpoint.io'>office@syncpoint.io</a>." data-en="Under the GDPR you have the right to access (Art. 15), rectification (Art. 16), erasure (Art. 17), restriction of processing (Art. 18), data portability (Art. 20), and to object to processing (Art. 21). To exercise your rights, simply send an email to <a href='mailto:office@syncpoint.io'>office@syncpoint.io</a>."></p>

  <h3 data-de="10. Beschwerderecht" data-en="10. Right to lodge a complaint"></h3>
  <p data-de="Du hast das Recht, Dich bei einer Aufsichtsbehörde zu beschweren. Zuständig in Österreich ist die Österreichische Datenschutzbehörde, Barichgasse 40–42, 1030 Wien, <a href='https://www.dsb.gv.at' target='_blank' rel='noopener'>dsb.gv.at</a>." data-en="You have the right to lodge a complaint with a supervisory authority. The competent authority in Austria is the Austrian Data Protection Authority (Datenschutzbehörde), Barichgasse 40–42, 1030 Vienna, <a href='https://www.dsb.gv.at' target='_blank' rel='noopener'>dsb.gv.at</a>."></p>

  <h3 data-de="11. Änderungen dieser Erklärung" data-en="11. Changes to this policy"></h3>

<script>
  function setLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-de]').forEach(el => {
      const t = el.getAttribute('data-' + lang);
      if (t == null) return;
      if (/[<&]/.test(t)) {
        el.innerHTML = t;
      } else {
        el.textContent = t;
      }
    });
    document.getElementById('btn-de').classList.toggle('active', lang === 'de');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('lang', lang);
  }

  const saved = localStorage.getItem('lang');
  const browserLang = (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';
  setLang(saved || browserLang);
</script>
