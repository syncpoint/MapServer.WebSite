  <p data-de="Als Verbraucher hast Du nach dem österreichischen Fern- und Auswärtsgeschäfte-Gesetz (FAGG) grundsätzlich das Recht, binnen 14 Tagen ohne Angabe von Gründen vom Vertrag zurückzutreten. Bei digitalen Inhalten, die nicht auf einem körperlichen Datenträger geliefert werden, erlischt dieses gesetzliche Rücktrittsrecht, sobald die Ausführung — also der Download — mit Deiner ausdrücklichen Zustimmung und Deiner Kenntnisnahme des Verlusts des Rücktrittsrechts begonnen hat. Unabhängig davon gilt die folgende freiwillige Garantie." data-en="As a consumer, under the Austrian Distance and Off-Premises Contracts Act (FAGG) you generally have the right to withdraw from the contract within 14 days without giving reasons. For digital content not supplied on a tangible medium, this statutory right of withdrawal expires once performance — i.e. the download — has begun with your express consent and your acknowledgement that you thereby lose the right of withdrawal. Independently of this, the following voluntary guarantee applies."></p>

<script>
  function setLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-de]').forEach(el => {
      const t = el.getAttribute('data-' + lang);
      if (t == null) return;
      if (/[<&]/.test(t)) {
        el.innerHTML = t;
      } else {
        el.textContent = t;
      }
    });
    document.getElementById('btn-de').classList.toggle('active', lang === 'de');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('lang', lang);
  }

  const saved = localStorage.getItem('lang');
  const browserLang = (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';
  setLang(saved || browserLang);
</script>
