<script>
  const heroTitles = {
    de: 'Deine digitale Karte.<br><span>Auf Deinem Windows Gerät.</span>',
    en: 'Your map data.<br><span>On your Windows device.</span>'
  };

  function setLang(lang) {
    document.documentElement.lang = lang;
    document.getElementById('hero-title').innerHTML = heroTitles[lang];
    document.querySelectorAll('[data-de]').forEach(el => {
      const t = el.getAttribute('data-' + lang);
      if (!t || el.id === 'hero-title') return;
      if (el.classList.contains('support-hint')) {
        el.innerHTML = t.replace(/&lt;/g, '<').replace(/&gt;/g, '>');
      } else {
        el.textContent = t;
      }
    });
    document.getElementById('btn-de').classList.toggle('active', lang === 'de');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('lang', lang);
  }

  const saved = localStorage.getItem('lang');
  const browserLang = (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';
  setLang(saved || browserLang);
</script>
